{{if .Resources}}
<div class="count">{{len .Resources}} resource{{if ne (len .Resources) 1}}s{{end}} found</div>
<table class="resource-table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Kind</th>
            <th>Namespace</th>
            <th>Status</th>
            <th>Connection</th>
        </tr>
    </thead>
    <tbody>
        {{range .Resources}}
        <tr class="clickable-row"
            hx-get="/detail?kind={{.Kind}}&name={{.Name}}&namespace={{.Namespace}}"
            hx-target="#resource-list"
            hx-push-url="false"
            style="cursor: pointer;">
            <td class="mono">{{.Name}}</td>
            <td><span class="badge badge-kind">{{.Kind}}</span></td>
            <td class="mono">{{.Namespace}}</td>
            <td>
                {{if .Ready}}
                <span class="badge badge-ready">Ready</span>
                {{else}}
                <span class="badge badge-not-ready">Not Ready</span>
                {{end}}
            </td>
            <td class="mono">{{.ConnectionDetails}}</td>
        </tr>
        {{end}}
    </tbody>
</table>
{{else}}
<div class="empty-state">
    <p>No resources found</p>
</div>
{{end}}
