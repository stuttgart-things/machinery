<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machinery - Resource Dashboard</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/stuttgart-things/docs/main/hugo/sthings-argo.png">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #e1e4ed;
            --text-muted: #8b8fa3;
            --accent: #6c8aff;
            --green: #4ade80;
            --red: #f87171;
            --yellow: #fbbf24;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        header h1 { font-size: 1.5rem; font-weight: 600; }
        header h1 span { color: var(--accent); }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .pulse {
            width: 8px; height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .ctl-btn {
            padding: 0.15rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.15s;
        }
        .ctl-btn:hover { border-color: var(--accent); color: var(--accent); }
        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .filters:last-of-type { margin-bottom: 1.5rem; }
        .filter-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-right: 0.25rem;
            min-width: 5rem;
        }
        .filter-empty {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-style: italic;
        }
        .filter-btn {
            padding: 0.4rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(108, 138, 255, 0.08);
        }
        .resource-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--surface);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .resource-table th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .resource-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .resource-table tr:last-child td { border-bottom: none; }
        .resource-table tbody tr {
            transition: background 0.15s;
        }
        .resource-table tbody tr:hover {
            background: rgba(108, 138, 255, 0.04);
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .badge-ready {
            background: rgba(74, 222, 128, 0.1);
            color: var(--green);
        }
        .badge-not-ready {
            background: rgba(248, 113, 113, 0.1);
            color: var(--red);
        }
        .badge-kind {
            background: rgba(108, 138, 255, 0.1);
            color: var(--accent);
        }
        .mono {
            font-family: "SF Mono", "Cascadia Code", "Fira Code", monospace;
            font-size: 0.85rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .htmx-indicator {
            display: none;
            color: var(--accent);
            font-size: 0.85rem;
        }
        .htmx-request .htmx-indicator { display: inline; }
        .count {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
        .clickable-row:hover {
            background: rgba(108, 138, 255, 0.08) !important;
        }
        .back-btn {
            padding: 0.4rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--accent);
            cursor: pointer;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            transition: all 0.15s;
        }
        .back-btn:hover {
            border-color: var(--accent);
            background: rgba(108, 138, 255, 0.08);
        }
        .detail-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .detail-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
        }
        .detail-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .detail-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .detail-section {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
        }
        .detail-section:last-child { border-bottom: none; }
        .detail-section h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 0.75rem;
        }
        .detail-field {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .detail-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .detail-value {
            font-size: 0.9rem;
            color: var(--text);
        }
        .detail-refresh { display: none; }
        footer {
            margin-top: 2rem;
            padding: 1rem 0;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            gap: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .footer-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }
        .footer-label { color: var(--text-muted); }
        .footer-value { color: #94a3b8; font-family: "SF Mono", "Cascadia Code", "Fira Code", monospace; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>machinery</span> dashboard</h1>
            <div class="status-bar">
                <div class="pulse" id="pulse"></div>
                <span id="refresh-status">auto-refresh 5s</span>
                <button class="ctl-btn" id="toggle-refresh" title="pause / resume auto-refresh">pause</button>
                <button class="ctl-btn" id="refresh-now" title="refresh now">&#x21bb;</button>
                <span class="htmx-indicator" id="spinner">loading...</span>
            </div>
        </header>

        <div class="filters" id="kind-filters">
            <span class="filter-label">Kind</span>
            <button class="filter-btn kind-filter active" data-value="*">All</button>
            {{range .Kinds}}
            <button class="filter-btn kind-filter" data-value="{{.}}">{{.}}</button>
            {{end}}
        </div>

        <div class="filters" id="namespace-filters">
            <span class="filter-label">Namespace</span>
            <button class="filter-btn ns-filter active" data-value="*">All</button>
            <span class="filter-empty" id="ns-empty">no namespaces yet — refreshing</span>
        </div>

        <div id="resource-list"
             hx-get="/resources?kind=*"
             hx-trigger="load"
             hx-sync="this:abort"
             hx-indicator="#spinner">
        </div>

        <footer>
            <div class="footer-item"><span class="footer-label">version</span> <span class="footer-value">{{.Build.Version}}</span></div>
            <div class="footer-item"><span class="footer-label">commit</span> <span class="footer-value">{{.Build.Commit}}</span></div>
            <div class="footer-item"><span class="footer-label">built</span> <span class="footer-value">{{.Build.Date}}</span></div>
            <div class="footer-item" style="margin-left:auto"><span class="footer-label">a</span> <a href="https://github.com/stuttgart-things" target="_blank" style="color:#818cf8;text-decoration:none">stuttgart-things</a> <span class="footer-label">project</span> <img src="https://raw.githubusercontent.com/stuttgart-things/docs/main/hugo/sthings-logo.png" alt="sthings" style="height:24px;vertical-align:middle"></div>
        </footer>
    </div>

    <script>
        // Filter state owned by the page, not the server. Each chip
        // toggles membership in the relevant set; an empty set means
        // "no filter" → server returns everything for that axis.
        const state = { kinds: new Set(), namespaces: new Set() };

        const REFRESH_MS = 5000;
        let refreshTimer = null;

        function buildURL() {
            const p = new URLSearchParams();
            p.set('kind', state.kinds.size ? [...state.kinds].join(',') : '*');
            if (state.namespaces.size) {
                p.set('namespace', [...state.namespaces].join(','));
            }
            return '/resources?' + p.toString();
        }

        // refreshNow issues a request for the *current* filter selection
        // and swaps it into #resource-list. Every refresh path — filter
        // clicks, the manual button, the auto-refresh interval — goes
        // through here, so a refresh can never silently drop the active
        // filter. hx-sync="this:abort" on the target means a fresh
        // request always wins over an in-flight poll.
        function refreshNow() {
            htmx.ajax('GET', buildURL(), '#resource-list');
        }

        // Auto-refresh is a JS interval (not htmx `every 5s`) so it can
        // be paused and so every tick goes through refreshNow() with the
        // live filter — the htmx poller used a fixed hx-get and could
        // revert the table to "all namespaces" (see #75).
        function startAutoRefresh() {
            if (refreshTimer) return;
            refreshTimer = setInterval(refreshNow, REFRESH_MS);
            document.getElementById('refresh-status').textContent = 'auto-refresh 5s';
            document.getElementById('toggle-refresh').textContent = 'pause';
            document.getElementById('pulse').style.animationPlayState = 'running';
        }

        function stopAutoRefresh() {
            clearInterval(refreshTimer);
            refreshTimer = null;
            document.getElementById('refresh-status').textContent = 'paused';
            document.getElementById('toggle-refresh').textContent = 'resume';
            document.getElementById('pulse').style.animationPlayState = 'paused';
        }

        document.getElementById('toggle-refresh').addEventListener('click', () => {
            if (refreshTimer) stopAutoRefresh();
            else startAutoRefresh();
        });
        document.getElementById('refresh-now').addEventListener('click', refreshNow);

        function syncAllButton(rowId, set) {
            const allBtn = document.querySelector(`#${rowId} [data-value="*"]`);
            if (!allBtn) return;
            if (set.size === 0) allBtn.classList.add('active');
            else allBtn.classList.remove('active');
        }

        // Single delegated handler for both filter rows. A filter click
        // is an explicit user action — it refreshes immediately, even
        // while auto-refresh is paused.
        document.addEventListener('click', e => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            const rowId = btn.closest('.filters')?.id;
            if (rowId !== 'kind-filters' && rowId !== 'namespace-filters') return;
            const set = rowId === 'kind-filters' ? state.kinds : state.namespaces;
            const value = btn.dataset.value;
            if (value === '*') {
                set.clear();
                btn.parentElement.querySelectorAll('.filter-btn')
                    .forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            } else {
                if (set.has(value)) {
                    set.delete(value);
                    btn.classList.remove('active');
                } else {
                    set.add(value);
                    btn.classList.add('active');
                }
                syncAllButton(rowId, set);
            }
            refreshNow();
        });

        // Namespace chips are dynamic — re-derived from each /resources
        // response. The chip row in the markup is a placeholder.
        document.body.addEventListener('htmx:afterSwap', e => {
            if (e.target.id !== 'resource-list') return;
            const data = e.target.querySelector('#ns-data');
            if (!data) return;
            let namespaces;
            try { namespaces = JSON.parse(data.dataset.namespaces); }
            catch { namespaces = []; }
            renderNamespaceChips(namespaces);
        });

        // renderNamespaceChips rebuilds the namespace row from the
        // server's namespace list UNIONED with whatever the user has
        // selected. The union is the fix for #75: a selected namespace
        // always keeps a visible, deselectable chip and is never dropped
        // from `state` — even if its resources momentarily vanish from a
        // poll response. `state` is read here, never mutated. The kind
        // row is static markup and is never rebuilt.
        function renderNamespaceChips(namespaces) {
            const row = document.getElementById('namespace-filters');
            // '' = cluster-scoped resources; not a filterable chip.
            const all = new Set(namespaces.filter(ns => ns !== ''));
            for (const ns of state.namespaces) all.add(ns);
            const filterable = [...all].sort();

            const html = ['<span class="filter-label">Namespace</span>'];
            html.push(
                `<button class="filter-btn ns-filter ${state.namespaces.size === 0 ? 'active' : ''}" data-value="*">All</button>`
            );
            if (filterable.length === 0) {
                html.push('<span class="filter-empty">no namespaced resources to filter</span>');
            } else {
                for (const ns of filterable) {
                    const active = state.namespaces.has(ns) ? 'active' : '';
                    html.push(`<button class="filter-btn ns-filter ${active}" data-value="${ns}">${ns}</button>`);
                }
            }
            row.innerHTML = html.join('');
        }

        startAutoRefresh();
    </script>
</body>
</html>
