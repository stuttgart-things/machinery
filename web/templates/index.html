<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machinery - Resource Dashboard</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #e1e4ed;
            --text-muted: #8b8fa3;
            --accent: #6c8aff;
            --green: #4ade80;
            --red: #f87171;
            --yellow: #fbbf24;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        header h1 { font-size: 1.5rem; font-weight: 600; }
        header h1 span { color: var(--accent); }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .pulse {
            width: 8px; height: 8px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.4rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(108, 138, 255, 0.08);
        }
        .resource-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--surface);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .resource-table th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        .resource-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .resource-table tr:last-child td { border-bottom: none; }
        .resource-table tbody tr {
            transition: background 0.15s;
        }
        .resource-table tbody tr:hover {
            background: rgba(108, 138, 255, 0.04);
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .badge-ready {
            background: rgba(74, 222, 128, 0.1);
            color: var(--green);
        }
        .badge-not-ready {
            background: rgba(248, 113, 113, 0.1);
            color: var(--red);
        }
        .badge-kind {
            background: rgba(108, 138, 255, 0.1);
            color: var(--accent);
        }
        .mono {
            font-family: "SF Mono", "Cascadia Code", "Fira Code", monospace;
            font-size: 0.85rem;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        .htmx-indicator {
            display: none;
            color: var(--accent);
            font-size: 0.85rem;
        }
        .htmx-request .htmx-indicator { display: inline; }
        .count {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span>machinery</span> dashboard</h1>
            <div class="status-bar">
                <div class="pulse"></div>
                auto-refresh 5s
                <span class="htmx-indicator" id="spinner">loading...</span>
            </div>
        </header>

        <div class="filters">
            <button class="filter-btn active"
                    hx-get="/resources?kind=*"
                    hx-target="#resource-list"
                    hx-indicator="#spinner"
                    onclick="setActive(this)">All</button>
            {{range .Kinds}}
            <button class="filter-btn"
                    hx-get="/resources?kind={{.}}"
                    hx-target="#resource-list"
                    hx-indicator="#spinner"
                    onclick="setActive(this)">{{.}}</button>
            {{end}}
        </div>

        <div id="resource-list"
             hx-get="/resources?kind=*"
             hx-trigger="load, every 5s"
             hx-indicator="#spinner">
        </div>
    </div>

    <script>
        function setActive(btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // Update the auto-refresh URL
            const list = document.getElementById('resource-list');
            const url = btn.getAttribute('hx-get');
            list.setAttribute('hx-get', url);
            htmx.process(list);
        }
    </script>
</body>
</html>
