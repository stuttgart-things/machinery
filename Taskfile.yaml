---
version: 3
vars:
  PROJECT_NAME:
    sh: echo ${PWD##*/}
  BRANCH:
    sh: if [ $(git rev-parse --abbrev-ref HEAD) != "main" ]; then echo $(git rev-parse --abbrev-ref HEAD); else echo main ; fi
  GIT_COMMIT:
    sh: git log -n 1 --format=%h
  DATE:
    sh: date -Ih
  VERSION:
    sh: |
      [ "$(git branch --show-current)" != "main" ] && echo "dev-$(git describe --tags --abbrev=0)" || echo $(git describe --tags --abbrev=0)
  KIND_CLUSTER: machinery-e2e
  E2E_IMAGE: machinery:e2e
  E2E_NS: machinery

dotenv: ['.env', '{{.HOME}}/.env']

tasks:
  server:
    desc: Start server
    cmds:
      - go run main.go

  client:
    desc: Start client
    cmds:
      - go run client/client.go
    env:
      SECURE_CONNECTION:
        sh: gum choose --header="SECURE_CONNECTION?:" "true" "false"
      CLUSTERBOOK_SERVER: "localhost:50051"

  do:
    desc: Select a task to run
    cmds:
      - |
        task=$(yq e '.tasks | keys' Taskfile.yaml | sed 's/^- //' | gum choose)
        task ${task}

  proto:
    desc: Generate go code from proto files
    cmds:
      - protoc --go_out=. --go_opt=paths=source_relative --go-grpc_out=. --go-grpc_opt=paths=source_relative {{ .PROTO_DIR }}/*.proto
    vars:
      PROTO_DIR: resourceservice

  branch:
    desc: Create branch from main
    cmds:
      - git checkout main
      - git branch
      - git pull
      - |
        echo "Enter to be created (remote) branch:"
        read BRANCH_NAME;
        git checkout -b ${BRANCH_NAME}
        git push origin ${BRANCH_NAME}
      - git branch
      - git branch --set-upstream-to=origin/main ${BRANCH_NAME}

  commit:
    desc: Commit + push code into branch
    cmds:
      - rm -rf dist/
      - git branch --set-upstream-to=origin/{{ .BRANCH }}
      - git pull
      - |
        git add *
        if [[ -n $(git status --porcelain) ]]; then
          echo "committing changes"
          echo "ENTER COMMIT MESSAGE"
          COMMIT_MESSAGE=$(echo $(gum choose "feat: {{ .BRANCH }}" "fix: {{ .BRANCH }}" "BREAKING CHANGE: {{ .BRANCH }}" "ENTER CUSTOM COMMIT MESSAGE"))

          if [ "$COMMIT_MESSAGE" == "ENTER CUSTOM COMMIT MESSAGE" ]; then
            COMMIT_MESSAGE=$(echo $(gum input --placeholder "scope" --value "commit to {{ .BRANCH }}"))
          fi

          git commit --allow-empty -a -m "$(echo ${COMMIT_MESSAGE})"
        else
          echo "no changes"
        fi
        git push origin -u {{ .BRANCH }}

  e2e:up:
    desc: Create kind cluster, build + load machinery image with ko, install test CRDs/RBAC, deploy via KCL, apply fixtures
    cmds:
      - bash tests/e2e/scripts/up.sh
    env:
      KIND_CLUSTER: "{{.KIND_CLUSTER}}"
      E2E_IMAGE: "{{.E2E_IMAGE}}"
      E2E_NS: "{{.E2E_NS}}"

  e2e:test:
    desc: Port-forward machinery and run the gRPC e2e tests against the running kind cluster
    cmds:
      # `go test` runs in the foreground, the port-forward in the background;
      # `trap … EXIT` reaps the port-forward whether tests pass or fail so the
      # next run isn't blocked by a stale forward on :50051.
      - |
        set -eu
        kubectl -n {{.E2E_NS}} port-forward svc/machinery 50051:50051 >/tmp/machinery-pf.log 2>&1 &
        PF_PID=$!
        trap 'kill ${PF_PID} 2>/dev/null || true' EXIT
        # Wait for the forward to actually bind before dialing. `kubectl
        # port-forward` returns immediately but the listener takes a moment.
        for i in $(seq 1 30); do
          if (echo > /dev/tcp/127.0.0.1/50051) 2>/dev/null; then break; fi
          sleep 1
        done
        E2E_GRPC_ADDR=localhost:50051 go test -tags=e2e -v -count=1 ./tests/e2e/...

  e2e:dump:
    desc: Dump pods, logs, events, fixtures from the e2e cluster
    cmds:
      - bash tests/e2e/scripts/dump.sh
    env:
      E2E_NS: "{{.E2E_NS}}"

  e2e:down:
    desc: Tear down the kind cluster
    cmds:
      - kind delete cluster --name {{.KIND_CLUSTER}} || true

  e2e:
    desc: Full e2e — bring up, run tests, dump-on-failure, tear down
    cmds:
      # mvdan/sh doesn't accept named signals in `trap`; EXIT covers normal
      # exit + `set -e` failures, which is what CI needs for cleanup.
      # `task e2e:dump` always runs — a tiny bit of noise on the green path
      # is better than the alternative (conditional dump bodies under mvdan/sh
      # silently skipped on failure in the pitcher project).
      - |
        set -eu
        trap 'task e2e:dump || true; task e2e:down' EXIT
        task e2e:up
        task e2e:test